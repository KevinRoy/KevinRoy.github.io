name: Update finance feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-finance-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build finance page
        run: node scripts/build-finance-feed.js

      - name: Commit finance page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update finance feed"
          file_pattern: "finance/index.html finance/articles data/translation-cache.json"
